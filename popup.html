<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Time Waste Watcher Settings</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .add-site-controls { display: flex; gap: 8px; margin-bottom: 12px; }
    .add-site-controls input[type="text"] { flex: 1; padding: 4px 6px; }
    table { width: 100%; }
    td { padding: 5px; }
    input[type="number"] { width: 60px; }
    .remove-site-btn { padding: 4px 8px; }
    button { margin-top: 10px; padding: 5px 10px; }
  </style>
</head>
<body>
  <h1>Time Limits</h1>
  <p>Set a limit to <strong>0</strong> to disable it.</p>
  <div class="add-site-controls">
    <input id="newSiteInput" type="text" placeholder="Add website (example.com or https://example.com)">
    <button id="addSiteBtn" type="button">Add Website</button>
  </div>
  <table id="limitsTable">
    <tr>
      <th>Site</th>
      <th>Daily Limit (minutes)</th>
      <th>Hourly Limit (minutes)</th>
      <th></th>
    </tr>
    <!-- Rows will be inserted dynamically -->
  </table>
  <script src="popup.js"></script>
</body>
</html>
