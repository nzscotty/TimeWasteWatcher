  <!-- Clock hour hand -->
  <line x1="32" y1="32" x2="32" y2="16" stroke="#343a40" stroke-width="4" stroke-linecap="round"/>
  <!-- Clock minute hand -->
  <line x1="32" y1="32" x2="44" y2="32" stroke="#343a40" stroke-width="4" stroke-linecap="round"/>
</svg>
